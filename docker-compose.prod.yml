version: "3.9"
services:
  db:
    image: postgres:16
    container_name: clinid_db
    environment:
      POSTGRES_USER: clinid
      POSTGRES_PASSWORD: clinid
      POSTGRES_DB: clinid
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinid -d clinid"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: clinid_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://clinid:clinid@db:5432/clinid
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WEB_BASE_URL: http://web:3000
      SWAGGER_ENABLED: "false" # habilite se quiser docs em prod
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    container_name: clinid_web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
