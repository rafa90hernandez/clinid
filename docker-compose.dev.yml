services:
  db:
    image: postgres:16
    container_name: clinid_db
    environment:
      POSTGRES_USER: clinid
      POSTGRES_PASSWORD: clinid
      POSTGRES_DB: clinid
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clinid_api
    depends_on:
      - db
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://clinid:clinid@db:5432/clinid
      JWT_SECRET: change-me
      PORT: "3001"
      NODE_ENV: development
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run build && node dist/main.js"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: clinid_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_BASE: "http://api:3001"
      API_BACKEND_URL: "http://api:3001"
      NEXT_PUBLIC_API_URL: "/api"
      NODE_ENV: development
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"

volumes:
  db_data: